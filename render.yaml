# Yougrep — Render Blueprint (infrastructure-as-code)
#
# Deploys the app as connected Render resources: a Next.js `web` service, a
# long-running `worker`, and a scheduled `cron` job. See docs/render.md.
#
# Data plane lives OUTSIDE Render:
#   - Source of truth: managed Postgres (ClickHouse Cloud's bundled PG), reached
#     via DATABASE_URL. We do NOT provision a Render database.
#   - Analytics / CDC target: ClickHouse Cloud, reached via CLICKHOUSE_URL.
# packages/db speaks node-postgres when DATABASE_URL is set (PGlite only locally).
#
# Secrets are `sync: false` — Render prompts for them at blueprint launch; never
# commit real values. The matching local values live in the root .env (gitignored).

services:
  # Recruiter UI + candidate UI + public job board + API/auth + realtime bootstrap
  # + the channel agent (Pioneer tool-loop, Composio connectors, ClickHouse SQL).
  - type: web
    name: yougrep-web
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/chcardoz/harness-engineering-hack
    branch: straight-to-prod
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @yougrep/web build
    startCommand: pnpm --filter @yougrep/web start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INTEGRATIONS_MODE
        value: live
      # Guild is a no-op tracing shim today (no key needed); keep it stubbed.
      - key: GUILD_MODE
        value: stub
      # Source of truth — external managed Postgres (ClickHouse Cloud PG).
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false # https://<your-web-service>.onrender.com
      # Text path: backend -> Guild -> Pioneer -> provider.
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: TEXT_MODEL
        value: gpt-4.1
      # Voice path: backend mints an ephemeral OpenAI Realtime credential.
      - key: OPENAI_API_KEY
        sync: false
      - key: VOICE_MODEL
        value: gpt-realtime-2
      # Connectors: per-end-user OAuth via Composio (GitHub/Notion/Linear).
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_AUTH_CONFIGS_JSON
        sync: false # {"github":"ac_...","notion":"ac_...","linear":"ac_..."}
      # Analytics / CDC: ClickHouse Cloud (agent SQL tool + OpenUI analytics).
      - key: CLICKHOUSE_URL
        sync: false
      - key: CLICKHOUSE_USER
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      # Structured logs (see @yougrep/logger). JSON on Render for greppability.
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info

  # Background reconciliation tier (continuous poll loop / "stub queue").
  # Finalizes interview result packages the inline path missed.
  - type: worker
    name: yougrep-worker
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/chcardoz/harness-engineering-hack
    branch: straight-to-prod
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @yougrep/worker start
    envVars:
      - key: NODE_ENV
        value: production
      - key: INTEGRATIONS_MODE
        value: live
      - key: GUILD_MODE
        value: stub
      - key: WORKER_INTERVAL_MS
        value: "30000"
      - key: DATABASE_URL
        sync: false
      # Interview finalize may narrate via Pioneer.
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: TEXT_MODEL
        value: gpt-4.1
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info

  # Scheduled one-shot pass (daily reconcile / stale cleanup).
  - type: cron
    name: yougrep-cron
    runtime: node
    region: oregon
    plan: starter
    repo: https://github.com/chcardoz/harness-engineering-hack
    branch: straight-to-prod
    schedule: "*/30 * * * *" # every 30 minutes
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @yougrep/worker start:once
    envVars:
      - key: NODE_ENV
        value: production
      - key: INTEGRATIONS_MODE
        value: live
      - key: GUILD_MODE
        value: stub
      - key: DATABASE_URL
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: PIONEER_BASE_URL
        value: https://api.pioneer.ai/v1
      - key: TEXT_MODEL
        value: gpt-4.1
      - key: LOG_FORMAT
        value: json
      - key: LOG_LEVEL
        value: info
